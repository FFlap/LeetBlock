name: leet_block
description: Block apps until you complete your daily LeetCode quota.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0-0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  installed_apps: ^1.5.0
  flutter_overlay_window: ^0.4.3
  intl: ^0.19.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  permission_handler: ^12.0.1
  url_launcher: ^6.2.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/app_icon/leetblock_logo.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/app_icon/
